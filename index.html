<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#fef3c7" />
<title>貯金カウンター</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;color:#3a2a1c;background:linear-gradient(180deg,#fef3c7,#fbbf24);touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100dvh;padding:14px;gap:10px;max-width:480px;margin:0 auto}
.title{font-family:"Mochiy Pop P One",sans-serif;font-size:24px;color:#d97706;-webkit-text-stroke:2.5px #fff;paint-order:stroke fill;text-shadow:3px 3px 0 #3a2a1c;text-align:center;margin:6px 0}
.goal-card{background:#fff;border:3px solid #3a2a1c;border-radius:14px;padding:14px;box-shadow:3px 3px 0 #3a2a1c;display:flex;flex-direction:column;gap:6px}
.goal-card .lbl{font-size:11px;font-weight:bold;color:#d97706}
.goal-card input{background:#fef3c7;border:2px solid #3a2a1c;border-radius:8px;padding:10px;font-size:18px;font-family:inherit;width:100%}
.amount{flex:1;background:#fff;border:3px solid #3a2a1c;border-radius:18px;padding:18px;box-shadow:4px 4px 0 #3a2a1c;display:flex;flex-direction:column;gap:10px;align-items:center;overflow-y:auto}
.amount .big{font-family:"Mochiy Pop P One",sans-serif;font-size:48px;color:#d97706;-webkit-text-stroke:2.5px #3a2a1c;paint-order:stroke fill;line-height:1;margin-top:8px}
.amount .big small{font-size:18px}
.bar{width:100%;height:24px;background:#fff5e0;border:2px solid #3a2a1c;border-radius:999px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#10b981);transition:width .5s}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}
.amount .meta{display:flex;flex-direction:column;gap:4px;align-items:center;font-size:11px;opacity:.85;text-align:center;line-height:1.5}
.coins{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:6px}
.coins span{font-size:20px;animation:drop .3s}
@keyframes drop{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.add-row{display:flex;gap:6px;flex-wrap:wrap}
.add-row button{flex:1;background:#d97706;color:#fff;border:3px solid #3a2a1c;padding:10px;font-family:"Mochiy Pop P One",sans-serif;font-size:13px;border-radius:10px;cursor:pointer;box-shadow:2px 2px 0 #3a2a1c;min-width:60px}
.add-row button:active{transform:translate(2px,2px);box-shadow:0 0 0 #3a2a1c}
.actions{display:flex;gap:8px}
.actions button{flex:1;background:#fff;color:#3a2a1c;border:3px solid #3a2a1c;padding:10px;font-family:"Mochiy Pop P One",sans-serif;font-size:12px;border-radius:10px;cursor:pointer;box-shadow:2px 2px 0 #3a2a1c}
.actions .red{background:#ef4444;color:#fff}
.history{font-size:10px;opacity:.6;text-align:center}
</style>
</head>
<body>
<div id="app">
<h1 class="title">貯金カウンター 🐷</h1>
<div class="goal-card">
  <div class="lbl">目標金額</div>
  <input type="number" id="goal" inputmode="numeric" placeholder="例: 100000"/>
  <div class="lbl">目標の名前</div>
  <input type="text" id="name" placeholder="例: 旅行" maxlength="20"/>
</div>
<div class="amount">
  <div style="font-size:80px;line-height:1">🐷</div>
  <div class="big">¥<span id="cur">0</span></div>
  <div class="bar"><div class="bar-fill" id="fill"></div><div class="bar-text" id="pct">0%</div></div>
  <div class="meta">
    <div>目標まであと <b id="remain">¥0</b></div>
    <div id="days">—</div>
  </div>
  <div class="coins" id="coins"></div>
</div>
<div class="add-row">
  <button data-v="100">+100</button>
  <button data-v="500">+500</button>
  <button data-v="1000">+1000</button>
  <button data-v="3000">+3000</button>
  <button data-v="5000">+5000</button>
  <button data-v="10000">+1万</button>
</div>
<div class="actions">
  <button id="btn-undo">↶ 取り消し</button>
  <button id="btn-reset" class="red">↺ リセット</button>
</div>
<div class="history" id="history">—</div>
</div>
<script>
(()=>{
'use strict';
const KEY='chokin_jp_v1';
const $=(id)=>document.getElementById(id);
const state=JSON.parse(localStorage.getItem(KEY)||'{"cur":0,"goal":100000,"name":"","log":[]}');
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function render(){
  $('goal').value=state.goal;$('name').value=state.name||'';
  $('cur').textContent=state.cur.toLocaleString();
  const pct=Math.min(100,Math.round(state.cur/state.goal*100));
  $('fill').style.width=pct+'%';$('pct').textContent=pct+'%';
  const r=Math.max(0,state.goal-state.cur);
  $('remain').textContent='¥'+r.toLocaleString();
  if(state.log.length>0){
    const first=new Date(state.log[0].ts);const days=Math.max(1,Math.ceil((Date.now()-first)/86400000));
    const avg=state.cur/days;
    const more=avg>0?Math.ceil(r/avg):0;
    $('days').textContent=days+'日継続 / 1日平均¥'+Math.round(avg).toLocaleString()+(r>0&&avg>0?` / 達成まで残り約${more}日`:'');
  }else $('days').textContent='—';
  // coins (max 50)
  const c=$('coins');while(c.firstChild)c.removeChild(c.firstChild);
  const n=Math.min(50,Math.floor(state.cur/(state.goal/50)));
  for(let i=0;i<n;i++){const s=document.createElement('span');s.textContent='🪙';c.appendChild(s)}
  $('history').textContent=state.log.length>0?'最終: '+new Date(state.log[state.log.length-1].ts).toLocaleString('ja-JP'):'—';
}
function add(v){
  state.cur+=v;state.log.push({v,ts:Date.now()});
  if(state.log.length>200)state.log=state.log.slice(-200);
  save();render();beep(660+v/200,.1);
  if(state.cur>=state.goal && !window._cheered){window._cheered=true;fanfare()}
}
function undo(){
  if(state.log.length===0)return;
  const last=state.log.pop();state.cur-=last.v;
  if(state.cur<0)state.cur=0;
  save();render();beep(330,.08);
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.13)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))};
$('goal').addEventListener('change',()=>{state.goal=Math.max(1,parseInt($('goal').value)||100000);save();render()});
$('name').addEventListener('change',()=>{state.name=$('name').value;save()});
document.querySelectorAll('.add-row button').forEach(b=>b.addEventListener('click',()=>{en();add(parseInt(b.dataset.v))}));
$('btn-undo').addEventListener('click',()=>{en();undo()});
$('btn-reset').addEventListener('click',()=>{if(confirm('全部リセット？')){state.cur=0;state.log=[];save();window._cheered=false;render()}});
render();
})();
</script>
</body>
</html>
